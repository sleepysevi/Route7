<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route7 | Cebu City Guide</title>

    <!-- Tailwind (CDN dev build) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- ── Leaflet (MUST come before app.js) ── -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App styles -->
    <link rel="stylesheet" href="./css/style.css">

    <style>
        /* Map panel */
        #map-panel {
            margin-bottom: 12px;
        }
        #map-container {
            height: 260px;
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            z-index: 0;
            border: 1px solid #e5e7eb;
        }
        /* Fix Leaflet z-index clashing with sticky header */
        .leaflet-pane         { z-index: 1 !important; }
        .leaflet-top,
        .leaflet-bottom       { z-index: 2 !important; }

        /* Map caption bar */
        #map-caption {
            font-size: 12px;
            font-weight: 600;
            color: #374151;
            padding: 6px 10px;
            border-left: 4px solid #dc2626;
            background: #fff;
            border-radius: 0 0 10px 10px;
            margin-top: -2px;
            transition: border-color 0.3s;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- ===================== SPLASH SCREEN ===================== -->
    <div id="splash">
        <div class="deco-circle" style="width:320px;height:320px;top:-90px;right:-90px;"></div>
        <div class="deco-circle" style="width:180px;height:180px;top:40px;left:-60px;"></div>
        <div class="deco-circle" style="width:120px;height:120px;bottom:110px;right:30px;opacity:0.4;"></div>

        <!-- Jeepney SVG -->
        <div class="jeep-wrap">
            <svg width="200" height="110" viewBox="0 0 160 90" fill="none" xmlns="http://www.w3.org/2000/svg"
                 class="anim-fadeslide-down" style="animation-delay:0.05s">
                <rect x="10" y="28" width="140" height="42" rx="8" fill="rgba(255,255,255,0.22)"/>
                <rect x="10" y="28" width="36"  height="42" rx="8" fill="rgba(255,255,255,0.32)"/>
                <rect x="14" y="32" width="28"  height="22" rx="4" fill="rgba(255,255,255,0.5)"/>
                <rect x="52" y="33" width="18"  height="16" rx="3" fill="rgba(255,255,255,0.45)"/>
                <rect x="76" y="33" width="18"  height="16" rx="3" fill="rgba(255,255,255,0.45)"/>
                <rect x="100" y="33" width="18" height="16" rx="3" fill="rgba(255,255,255,0.45)"/>
                <rect x="124" y="33" width="20" height="16" rx="3" fill="rgba(255,255,255,0.45)"/>
                <rect x="10"  y="55" width="140" height="6" fill="#F59E0B" opacity="0.9"/>
                <rect x="22"  y="20" width="118" height="10" rx="4" fill="rgba(255,255,255,0.18)"/>
                <rect x="35"  y="14" width="8"   height="8"  rx="2" fill="rgba(255,255,255,0.3)"/>
                <rect x="55"  y="14" width="8"   height="8"  rx="2" fill="rgba(255,255,255,0.3)"/>
                <circle cx="34"  cy="72" r="10" fill="#1a1a1a"/>
                <circle cx="34"  cy="72" r="5"  fill="rgba(255,255,255,0.25)"/>
                <circle cx="126" cy="72" r="10" fill="#1a1a1a"/>
                <circle cx="126" cy="72" r="5"  fill="rgba(255,255,255,0.25)"/>
                <rect x="6" y="58" width="8" height="10" rx="3" fill="rgba(255,255,255,0.35)"/>
                <circle cx="12" cy="44" r="4" fill="#F59E0B" opacity="0.9"/>
                <line x1="50"  y1="30" x2="50"  y2="61" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
                <line x1="96"  y1="30" x2="96"  y2="61" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
                <line x1="122" y1="30" x2="122" y2="61" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            </svg>
        </div>

        <div class="splash-inner">
            <div class="brand-badge anim-fadeslide-down">Sugbu Buddy</div>
            <div class="brand-title anim-fadeslide-down" style="animation-delay:0.1s">Route<span>7</span></div>
            <div class="brand-sub anim-fadeslide-down" style="animation-delay:0.2s">Find your way around Cebu!</div>

            <div class="search-wrap anim-fadeslide-up" style="animation-delay:0.4s">
                <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="splash-search" placeholder="Where to? e.g. SM, Ayala, Carbon..." autocomplete="off"/>
            </div>

            <div class="tags anim-fadeslide-up" style="animation-delay:0.55s">
                <span class="tag" data-query="SM City">SM City</span>
                <span class="tag" data-query="Ayala">Ayala</span>
                <span class="tag" data-query="Carbon">Carbon</span>
                <span class="tag" data-query="Colon">Colon</span>
                <span class="tag" data-query="IT Park">IT Park</span>
                <span class="tag" data-query="Lahug">Lahug</span>
                <span class="tag" data-query="Talamban">Talamban</span>
                <span class="tag" data-query="Mandaue">Mandaue</span>
                <span class="tag" data-query="Talisay">Talisay</span>
                <span class="tag" data-query="Naga">Naga</span>
            </div>

            <button id="enter-btn" class="enter-btn anim-fadeslide-up" style="animation-delay:0.7s">
                <i data-lucide="map" style="width:18px;height:18px;"></i>
                Explore all routes
            </button>
        </div>

        <!-- Animated road -->
        <div class="road-lines">
            <div class="road"></div>
            <div class="dashes" id="dashes"></div>
        </div>
    </div>

    <!-- ===================== MAIN APP ===================== -->
    <div id="main-app" class="hidden pb-24">

        <!-- Header -->
        <header class="bg-red-600 text-white p-4 shadow-md sticky top-0 z-50">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i data-lucide="map-pin"></i>
                Route<span style="color:#F59E0B">7</span>
            </h1>
            <p class="text-xs opacity-75 mt-0.5">Cebu City Guide</p>
        </header>

        <main class="p-4 max-w-md mx-auto">

            <!-- Search bar -->
            <div class="relative mb-3">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search routes, destinations, areas..."
                    class="w-full p-3 pl-11 pr-4 rounded-2xl border border-gray-200 bg-white shadow-sm focus:ring-2 focus:ring-red-400 focus:border-transparent outline-none text-sm"
                >
                <i data-lucide="search" class="absolute left-3.5 top-3.5 text-gray-400 w-4 h-4"></i>
            </div>

            <!-- ══════════════════════════════════════════════
                 ROUTES SECTION
            ══════════════════════════════════════════════ -->
            <div id="routes-section">

                <!-- ── Map panel (hidden until a route is tapped) ── -->
                <div id="map-panel" class="hidden">
                    <div id="map-container"></div>
                    <div id="map-caption">Tap a route card to view its path</div>
                </div>

                <!-- Legend -->
                <div id="map-legend" class="hidden flex items-center gap-3 text-xs text-gray-400 mb-3 px-1">
                    <span class="flex items-center gap-1">
                        <span class="inline-block w-3 h-3 rounded-full bg-green-500 border-2 border-white shadow"></span> Start
                    </span>
                    <span class="flex items-center gap-1">
                        <span class="inline-block w-3 h-3 rounded-full bg-white border-2 border-gray-400 shadow"></span> End
                    </span>
                    <span class="ml-auto flex items-center gap-1 text-green-500 font-medium">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
                        </svg>
                        = map available
                    </span>
                </div>

                <!-- Group tab bar -->
                <div class="flex gap-2 overflow-x-auto pb-2 mb-3 no-scrollbar" id="group-tab-bar">
                    <!-- Rendered by JS -->
                </div>

                <!-- Route cards -->
                <div id="routes-container" class="space-y-2"></div>
            </div>

            <!-- ══════════════════════════════════════════════
                 DICTIONARY SECTION
            ══════════════════════════════════════════════ -->
            <div id="dict-section" class="hidden">
                <div class="flex items-center gap-2 mb-3 px-1">
                    <div>
                        <h2 class="font-bold text-gray-800 text-sm">Basic Phrases</h2>
                        <p class="text-xs text-gray-400">Useful phrases to know your way around</p>
                    </div>
                </div>
                <div id="dict-container" class="space-y-2"></div>
            </div>

        </main>

        <!-- Bottom Nav -->
        <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around p-2 shadow-xl z-50">
            <button onclick="switchTab('routes')" id="btn-routes"
                class="flex flex-col items-center gap-1 px-6 py-1 rounded-xl text-red-600 font-semibold transition-colors duration-200">
                <i data-lucide="bus" class="w-5 h-5"></i>
                <span class="text-xs">Routes</span>
            </button>
            <button onclick="switchTab('dict')" id="btn-dict"
                class="flex flex-col items-center gap-1 px-6 py-1 rounded-xl text-gray-400 transition-colors duration-200">
                <i data-lucide="languages" class="w-5 h-5"></i>
                <span class="text-xs">Dictionary</span>
            </button>
        </nav>
    </div>

    <!-- ── Scripts (order matters!) ──────────────────────────────────────────
         1. route-coords.js  → defines ROUTE_COORDS and getBounds() globals
         2. splash.js        → splash screen logic
         3. app.js           → main app (uses ROUTE_COORDS and Leaflet)
    ─────────────────────────────────────────────────────────────────────── -->
    <script src="./data/route-coords.js"></script>
    <script src="./js/splash.js"></script>
    <script src="./js/app.js"></script>

</body>
</html>
